<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    .stats span {
      font-weight: 600;
      color: #667eea;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 12px;
      border-radius: 10px;
      transition: background 0.15s;
      border-bottom: 1px solid #f0f4f8;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #f7fafc;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #cbd5e0;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }

    li.checked .checkbox {
      background: #667eea;
      border-color: #667eea;
    }

    .checkbox svg {
      display: none;
    }

    li.checked .checkbox svg {
      display: block;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      cursor: pointer;
      word-break: break-all;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      color: #cbd5e0;
      font-size: 1.1rem;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #fc8181;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background: none;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      color: #718096;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: #fc8181;
      color: #fc8181;
      background: #fff5f5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      쇼핑 리스트
    </h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요" maxlength="80" />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="stats" id="stats"></div>

    <ul id="list"></ul>

    <div class="empty" id="empty" style="display:none">
      아직 아이템이 없습니다.<br>위에서 추가해 보세요!
    </div>

    <button class="clear-btn" id="clearBtn" onclick="clearChecked()" style="display:none">
      완료 항목 삭제
    </button>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://uzlabmqnsxdxwyywnmfw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_RpoXno53sA0XnXwqgmyz8A_8Zv-LjlE';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];

    const listEl = document.getElementById('list');
    const inputEl = document.getElementById('itemInput');
    const statsEl = document.getElementById('stats');
    const emptyEl = document.getElementById('empty');
    const clearBtn = document.getElementById('clearBtn');

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    async function loadItems() {
      const { data, error } = await supabase
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: false });
      if (!error) {
        items = data;
        render();
      }
    }

    async function addItem() {
      const text = inputEl.value.trim();
      if (!text) { inputEl.focus(); return; }
      inputEl.value = '';
      inputEl.focus();
      const { data, error } = await supabase
        .from('shopping_items')
        .insert({ text, checked: false })
        .select()
        .single();
      if (!error) {
        items.unshift(data);
        render();
      }
    }

    async function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const { error } = await supabase
        .from('shopping_items')
        .update({ checked: !item.checked })
        .eq('id', id);
      if (!error) {
        item.checked = !item.checked;
        render();
      }
    }

    async function deleteItem(id) {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('id', id);
      if (!error) {
        items = items.filter(i => i.id !== id);
        render();
      }
    }

    async function clearChecked() {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('checked', true);
      if (!error) {
        items = items.filter(i => !i.checked);
        render();
      }
    }

    function render() {
      listEl.innerHTML = '';
      const total = items.length;
      const done = items.filter(i => i.checked).length;

      if (total === 0) {
        emptyEl.style.display = 'block';
        statsEl.textContent = '';
        clearBtn.style.display = 'none';
        return;
      }

      emptyEl.style.display = 'none';
      statsEl.innerHTML = `총 <span>${total}</span>개 &nbsp;·&nbsp; 완료 <span>${done}</span>개`;
      clearBtn.style.display = done > 0 ? 'block' : 'none';

      items.forEach(item => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        li.innerHTML = `
          <div class="checkbox">
            <svg width="13" height="13" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1.5,6 4.5,9 10.5,3"/>
            </svg>
          </div>
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn" title="삭제">&#x2715;</button>
        `;

        li.querySelector('.checkbox').addEventListener('click', () => toggleItem(item.id));
        li.querySelector('.item-text').addEventListener('click', () => toggleItem(item.id));
        li.querySelector('.delete-btn').addEventListener('click', () => deleteItem(item.id));

        listEl.appendChild(li);
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // clearChecked를 전역으로 노출 (onclick 속성에서 사용)
    window.clearChecked = clearChecked;
    window.addItem = addItem;

    loadItems();
  </script>
</body>
</html>
